<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  
  <!-- Emblem Base -->
  <g transform="translate(10, 10)">
    <circle cx="50" cy="50" r="46" fill="url(#navyGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- Crescent & Star / Plane Motif -->
    <path d="M 32 30 A 24 24 0 1 0 68 66 A 20 20 0 1 1 32 30 Z" fill="url(#goldGrad)" />
    <!-- Luxury Wing/Plane Line -->
    <path d="M 38 60 Q 55 40 72 32 Q 58 52 48 64 Z" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="68,26 73,32 66,33 70,38 64,36" fill="url(#goldGrad)"/>
  </g>

  <!-- Typography -->
  <text x="120" y="58" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="38" font-weight="800" fill="url(#goldGrad)" letter-spacing="2">THAIBAH</text>
  <text x="122" y="88" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="600" fill="#94A3B8" letter-spacing="8">TRAVELS</text>
  <text x="122" y="104" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#F59E0B" letter-spacing="2">LUXURY TOUR &amp; UMRAH MANAGEMENT</text>
</svg>
